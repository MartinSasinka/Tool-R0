# Baseline model config.
# Evaluates the pre-training / unmodified base model.
#
# Before running, set:  export CUDA_VISIBLE_DEVICES=0,1,2,4
# (excludes GPU 3 which is the DGX Display adapter)

profile_name: baseline

model:
  backend: vllm
  # Set this to your baseline model path (local dir or HF model id)
  model_path: Qwen/Qwen3-4B-Instruct-2507
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.90
  # max_model_len 8192 + max_new_tokens 4096 stop multi-call <tool_call_answer> truncation
  # observed on NESTFUL/BFCL with the previous 4096/512 budget.
  max_model_len: 12288
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 4096
  stop_tokens:
    - "</tool_call_answer>"

batch_size: 8

# BFCL categories to evaluate
# AST = ground-truth matching, Exec = real function execution
bfcl_categories:
  - simple
  - multiple
  - parallel
  - irrelevance
  - exec_simple
  - exec_multiple
  - exec_parallel
  - exec_parallel_multiple

# ToolAlpaca dataset path (auto-detected if not set)
# toolalpaca_dataset_path: data/toolalpaca/eval_simulated.json
