# execution_aware_v3_1_stepwise — FIXED post-audit schema.
# Component names must match lib/reward_v3_1.py DEFAULT_CONFIG.
#   tool_*_match     = exact gold tool-name match (NOT call count)
#   argument_value_match = normalized gold argument-VALUE match (NOT just executable)
#   executable_*     = separate from correctness
reward:
  name: execution_aware_v3_1_stepwise

  stage1:
    weights:
      format_valid: 0.20
      tool_name_match: 0.20
      argument_value_match: 0.25
      executable_step: 0.15
      final_answer_match: 0.20

  # Shared by stage2 / stage3 / stage4 (multi-call prefix / full trajectories).
  stage_multi:
    weights:
      format_valid: 0.10
      tool_sequence_match: 0.20
      argument_value_match: 0.15
      valid_references: 0.15
      dependency_use: 0.10
      executable_trajectory: 0.10
      expected_num_calls: 0.10
      final_answer_match: 0.10

  # Band enforcement (see audit Bug 8):
  #   parse_error / no_tool_call / premature_final -> 0.0
  #   wrong_tool                 <= 0.35
  #   correct_tool_wrong_args    <= 0.60
  #   executable_wrong_final     <= 0.75
  #   fully correct              >= 0.90 (floor)
  caps:
    parse_error: 0.0
    clipped: 0.0
    no_tool_call: 0.0
    premature_final_nonterminal: 0.0
    invalid_reference: 0.10
    wrong_tool: 0.35
    correct_tool_wrong_args: 0.60
    executable_wrong_final: 0.75
    too_few_calls: 0.30
    too_many_calls: 0.70

  floors:
    correct_tool_args_final: 0.90
