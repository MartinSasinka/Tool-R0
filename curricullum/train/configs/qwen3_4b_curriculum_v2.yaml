model:
  name: Qwen/Qwen3-4B-Instruct-2507
  dtype: bfloat16
  load_in_4bit: false
  attn_implementation: flash_attention_2   # falls back to sdpa gracefully if flash-attn unavailable

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

grpo:
  num_generations: 8              # ↑ from 4: 8×H100 has headroom; more rollouts = better GRPO gradient estimate
  per_device_train_batch_size: 1
  # Effective generation batch = per_device_batch × grad_accum × num_generations × world_size
  # = 1 × 2 × 8 × 8 = 128 sequences across 8 GPUs → well within 80GB KV budget
  gradient_accumulation_steps: 2  # ↓ from 4: world_size=8 already gives 4× more data-parallel vs 2-GPU run
  learning_rate: 5.0e-6
  beta: 0.02
  temperature: 0.7
  top_p: 0.95
  max_prompt_length: 4096         # global fallback; per-stage overrides below tighten it for long stages
  logging_steps: 1
  save_steps: 0
  loss_type: grpo
  # Trajectory logging: completions appear in wandb "completions" table (per step, per checkpoint)
  # and 4 samples/step are printed to console. Essential for seeing what the model learns.
  log_completions: true
  num_completions_to_print: 4

  # vLLM colocate generation — replaces HF model.generate() for GRPO rollouts.
  # Each of the 8 ranks runs its own vLLM engine (tensor_parallel_size=1) on its own GPU.
  # On 80GB with no CPU offload the KV pool can be larger → faster throughput per rank.
  use_vllm: true
  vllm_mode: colocate
  vllm_tensor_parallel_size: 1            # each rank = 1 GPU; 8 independent engines
  vllm_gpu_memory_utilization: 0.55       # ↑ from 0.45: 80GB has headroom; bigger KV pool
  vllm_enable_sleep_mode: false           # H100 80GB has enough VRAM — sleep mode causes cumem OOM on wake_up
  vllm_max_model_length: 6144             # ↑ from 5120: covers stage 5-6 (max_prompt 2560 + max_completion 3072 = 5632)
  vllm_model_impl: vllm

training:
  num_train_epochs: 1.0    # one epoch per call; orchestrator loops
  max_steps: null
  gradient_checkpointing: true

# Tool-R0 + IBM execution reward weights
reward_weights:
  format: 0.20
  call_match: 0.30
  exec_match: 0.50

# Curriculum advancement control
curriculum:
  advance_threshold_delta: 0.12   # advance when exec_pass >= baseline[n+1] + delta (raised from 0.12: forces ≥35% absolute accuracy before advancing)
  plateau_patience: 2              # advance after N epochs with no improvement (min 3 epochs before plateau fires)
  replay_fraction: 0.15            # fraction of training data drawn from prior stages
  # Max epochs per stage — sized to guarantee full curriculum completes within ~14 h on 8×H100 SXM.
  # Expected per-epoch wall time (8×H100, no offload):
  #   stage 1-2: ~20 min   stage 3: ~30 min   stage 4-5: ~35 min   stage 6: ~45 min
  # With plateau advance (typical: 3 epochs/stage), expected total ≈ 9-11 h.
  max_epochs_per_stage:
    stage_1: 4
    stage_2: 4
    stage_3: 4
    stage_4: 5
    stage_5: 5
    stage_6: 5

# Evaluation settings — optimized for 8-GPU sharded parallel eval
eval:
  batch_size: 32                   # ↑ from 16: 80GB handles larger batches; auto-halves on OOM
  max_new_tokens: 2048             # ↑ from 1024: previous run hit limit 22% of the time → truncated metrics
  max_new_tokens_final: 4096       # end-of-training final eval: full headroom for accuracy measurement
  save_failure_examples: 20
  max_tasks_per_epoch: 150         # cap per-epoch validation (null = all tasks)
  max_tasks_final: null            # final eval: all tasks

stages:
  stage_1:
    name: stage1_1call
    data_path: curricullum/data/filtered_toolr0_synthetic/epoch_1_1call.jsonl
    max_completion_length: 1536
    num_calls: 1

  stage_2:
    name: stage2_2call
    data_path: curricullum/data/filtered_toolr0_synthetic/epoch_2_2call.jsonl
    max_completion_length: 2048
    num_calls: 2

  stage_3:
    name: stage3_3call
    data_path: curricullum/data/filtered_toolr0_synthetic/epoch_3_3call.jsonl
    max_completion_length: 2048
    num_calls: 3

  stage_4:
    name: stage4_4call
    data_path: curricullum/data/filtered_toolr0_synthetic/epoch_4_4call.jsonl
    max_completion_length: 2560
    num_calls: 4
    max_prompt_length: 2560

  stage_5:
    name: stage5_5call
    data_path: curricullum/data/filtered_toolr0_synthetic/epoch_5_5call.jsonl
    max_completion_length: 3072
    num_calls: 5
    max_prompt_length: 2560

  stage_6:
    name: stage6_6call
    data_path: curricullum/data/filtered_toolr0_synthetic/epoch_6_6call.jsonl
    max_completion_length: 3072
    num_calls: 6
    max_prompt_length: 2560

checkpoints_root: curricullum/checkpoints/qwen3_4b_curriculum_v2
