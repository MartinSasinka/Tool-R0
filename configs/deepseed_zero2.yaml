# DeepSpeed ZeRO-2 — use for Qwen3.5 family training.
# ZeRO-3 + Qwen3.5 VLM incorrectly remaps checkpoint keys (all weights "MISSING", then OOM on init).
# See: https://github.com/huggingface/transformers/issues/45313
compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  deepspeed_multinode_launcher: standard
  offload_optimizer_device: none
  offload_param_device: none
  zero_stage: 2
distributed_type: DEEPSPEED
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 2
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
